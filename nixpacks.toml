# nixpacks.toml for Railway Laravel Hosting

[variables]
NIXPACKS_PHP_VERSION = "8.4"

[phases.setup]
nixPkgs = ["php", "php84Modules.gd", "php84Modules.bcmath", "php84Modules.mbstring", "php84Modules.mysql", "nodejs", "git"]

[phases.install]
cmds = ["composer install --optimize-autoloader --no-dev --ignore-platform-reqs --no-interaction --no-scripts", "npm install"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
